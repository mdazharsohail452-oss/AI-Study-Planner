<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Path Tutor</title>
    <meta name="description" content="Generate a personalized study path based on your goals and weak areas.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Basic structural mockup to demonstrate glassmorphism and the dark theme -->
    <main class="app-container">
        <header class="glass-panel">
            <h1>AI Study Path Tutor</h1>
            <p>Your personalized journey to mastery.</p>
        </header>

        <section id="intake-section" class="glass-panel content-area">
            <h2>Create Your Study Plan</h2>
            <p>Tell us what you want to learn, and our AI will build your roadmap.</p>
            
            <form id="intake-form" class="intake-form">
                <div class="form-group">
                    <label for="topic">What do you want to study?</label>
                    <input type="text" id="topic" name="topic" required placeholder="e.g., React.js, Python, System Design" />
                </div>
                
                <div class="form-group">
                    <label for="goal">What is your main goal?</label>
                    <input type="text" id="goal" name="goal" required placeholder="e.g., Build a full-stack app, Pass an interview" />
                </div>

                <div class="form-group">
                    <label for="weaknesses">What are your weak areas?</label>
                    <input type="text" id="weaknesses" name="weaknesses" required placeholder="e.g., State management, Algorithms" />
                </div>

                <button type="submit" class="btn-primary" id="generate-btn">Generate Path</button>
            </form>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboard-section" class="dashboard-area" style="display: none;">
            <!-- Header for dashboard -->
            <header class="dashboard-header glass-panel">
                <div class="user-info">
                    <h2>Your AI Study Plan</h2>
                    <p id="plan-overview" class="overview-text"></p>
                </div>
                <div class="progress-widget">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="circle" id="progress-path" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <text x="18" y="20.35" class="percentage" id="progress-text">0%</text>
                    </svg>
                </div>
            </header>

            <div id="plan-loading" style="display: none; text-align: center;" class="glass-panel">
                <p>Curating your personalized path...</p>
                <div class="spinner"></div>
            </div>

            <!-- CSS Grid layout for dashboard content -->
            <div id="dashboard-grid-container" class="dashboard-grid" style="display: none;">
                <!-- Roadmap (Left Column) -->
                <div class="dashboard-column roadmap-col">
                    <div class="glass-panel" id="roadmap-container">
                        <h3>Study Roadmap</h3>
                        <div id="roadmap-list" class="timeline"></div>
                    </div>
                </div>

                <!-- Right Column (Widgets) -->
                <div class="dashboard-column widgets-col">
                    <div class="glass-panel widget" id="priorities-container">
                        <h3>Revision Priorities</h3>
                        <ul id="priorities-list" class="priority-list"></ul>
                    </div>

                    <div class="glass-panel widget" id="questions-container">
                        <h3>Practice Questions</h3>
                        <ul id="questions-list" class="question-list"></ul>
                    </div>

                    <div class="glass-panel widget" id="resources-container">
                        <h3>Recommended Resources</h3>
                        <ul id="resources-list" class="resource-list"></ul>
                    </div>
                </div>
            </div>

            <button type="button" class="btn-secondary" id="reset-btn" style="margin-top: 1.5rem; align-self: flex-start;">Start Over</button>
        </section>
    </main>
    <script src="js/state.js"></script>
    <script src="js/ai-service.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
